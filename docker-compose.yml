services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: buypeer-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_KEY: "${APP_KEY:-}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-buypeer}"
      DB_USERNAME: "${DB_USERNAME:-buypeer}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      DB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      CACHE_DRIVER: "${CACHE_DRIVER:-file}"
      SESSION_DRIVER: "${SESSION_DRIVER:-file}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-sync}"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-buypeer}"
      MYSQL_USER: "${DB_USERNAME:-buypeer}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD:-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  app-storage:
  mysql-data:
