services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: buypeer-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "https://buypeer.shop"
      APP_KEY: "${APP_KEY:-}"
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: buypeer
      DB_USERNAME: buypeer
      DB_PASSWORD: buypeer123
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      RUN_MIGRATIONS: "true"
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: buypeer
      MYSQL_USER: buypeer
      MYSQL_PASSWORD: buypeer123
      MYSQL_ROOT_PASSWORD: rootpass123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

volumes:
  app-storage:
  mysql-data: