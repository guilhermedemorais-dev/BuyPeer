services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: buypeer-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "https://buypeer.shop"
      APP_KEY: "${APP_KEY:-}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "buypeer"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
      CACHE_DRIVER: "${CACHE_DRIVER:-file}"
      SESSION_DRIVER: "${SESSION_DRIVER:-file}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-sync}"
      RUN_MIGRATIONS: "true"
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: buypeer
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --skip-networking=0

volumes:
  app-storage:
  mysql-data: